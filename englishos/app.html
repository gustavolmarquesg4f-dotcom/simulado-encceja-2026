<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"><title>EnglishOS Pro — Grace AI</title><style>body{margin:0;font-family:Segoe UI,Arial;background:#eef6ff;color:#17263a;display:grid;place-items:center;min-height:100vh}.loading{text-align:center;padding:30px}.g{width:72px;height:72px;margin:auto;border-radius:24px;display:grid;place-items:center;background:linear-gradient(135deg,#43d5b4,#75aaff);font-size:28px;font-weight:900}.spin{width:38px;height:38px;margin:20px auto;border:4px solid #d5e1ed;border-top-color:#137a68;border-radius:50%;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="loading"><div class="g">G</div><h1>Preparando a Grace...</h1><p>Carregando seu curso completo.</p><div class="spin"></div></div><script>(async()=>{try{const files=Array.from({length:4},(_,i)=>`shell/shell-${String(i).padStart(2,'0')}.txt?v=11`);const html=(await Promise.all(files.map(async f=>{const r=await fetch(f,{cache:'no-store'});if(!r.ok)throw new Error(f);return r.text()}))).join('');document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<div class="loading"><div class="g">G</div><h1>Não consegui carregar</h1><p>Atualize usando Ctrl + F5.</p></div>'}})();</script></body></html>
