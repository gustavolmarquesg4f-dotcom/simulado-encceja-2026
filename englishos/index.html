<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#07111f">
<title>EnglishOS Pro — Grace</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07111f;color:#f5f8fc;font-family:Inter,Segoe UI,Arial,sans-serif}#loader{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;background:radial-gradient(circle at 20% 15%,rgba(45,212,170,.14),transparent 30%),radial-gradient(circle at 85% 10%,rgba(96,165,250,.16),transparent 28%),#07111f}.box{width:min(460px,100%);padding:34px;border:1px solid #263d58;border-radius:28px;background:linear-gradient(145deg,#112842,#091a2d);box-shadow:0 24px 70px rgba(0,0,0,.4)}.avatar{width:78px;height:78px;margin:0 auto 20px;border-radius:26px;display:grid;place-items:center;background:linear-gradient(135deg,#35d6ae,#70a8ff);color:#04111b;font-size:30px;font-weight:900}.spinner{width:48px;height:48px;border:4px solid #233a55;border-top-color:#35d6ae;border-radius:50%;animation:s 1s linear infinite;margin:20px auto}@keyframes s{to{transform:rotate(360deg)}}h1{margin:0 0 8px;font-size:30px}p{margin:0;color:#9db1c7;line-height:1.55}.retry{margin-top:18px;border:0;border-radius:13px;background:#35d6ae;color:#04111b;padding:12px 17px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div id="loader"><div class="box"><div class="avatar">G</div><h1>Preparando a Grace...</h1><p>Sua mentora está organizando aulas, conversação e progresso.</p><div class="spinner"></div></div></div>
<script>
(async()=>{try{
if(!('DecompressionStream' in window))throw new Error('Atualize o Chrome ou Edge para abrir esta versão.');
const files=Array.from({length:6},(_,i)=>`assets/payload-part-${String(i).padStart(2,'0')}.txt?v=4`);
const parts=await Promise.all(files.map(async f=>{const r=await fetch(f,{cache:'no-store'});if(!r.ok)throw new Error('Não consegui carregar todos os módulos.');return r.text()}));
const b64=parts.join('').replace(/\s/g,'');
const raw=atob(b64);const bytes=Uint8Array.from(raw,c=>c.charCodeAt(0));
const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
const html=await new Response(stream).text();
document.open();document.write(html);document.close();
}catch(e){document.getElementById('loader').innerHTML=`<div class="box"><div class="avatar">G</div><h1>Não foi possível abrir</h1><p>${e.message}</p><button class="retry" onclick="location.reload()">Tentar novamente</button></div>`;console.error(e)}})();
</script>
</body>
</html>
